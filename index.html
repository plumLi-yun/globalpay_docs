<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay 文档中心</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets/highlight.min.js"></script>
    <style>
        :root{--primary-color:#007bff;--bg-color:#f8f9fa;--text-color:#333;--border-color:#dee2e6}
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background-color:var(--bg-color);color:var(--text-color);margin:0;display:flex;flex-direction:column;height:100vh}
        #login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#fff;display:flex;justify-content:center;align-items:center;z-index:1000}
        .login-card{background:#fff;padding:2rem;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);text-align:center;width:300px}
        input[type=password]{width:100%;padding:10px;margin:10px 0;border:1px solid var(--border-color);border-radius:4px;box-sizing:border-box}
        button{width:100%;padding:10px;background-color:var(--primary-color);color:#fff;border:none;border-radius:4px;cursor:pointer;font-weight:700}
        button:hover{opacity:.9}
        #main-content{display:none;flex:1;overflow:hidden}
        .sidebar{width:200px;background:#fff;padding:1.5rem 1rem;overflow-y:auto}
        .sidebar h3{margin-top:0;margin-bottom:.5rem;font-size:1.4rem;font-weight:800;color:var(--primary-color);letter-spacing:-.5px}
        .lang-select-container{margin-bottom:1rem;text-align:right}
        .lang-select{padding:4px 8px;font-size:.75rem;border:1px solid var(--border-color);border-radius:4px;background-color:#fff;color:#666;cursor:pointer;outline:0;width:100%}
        .lang-select:hover{border-color:var(--primary-color)}
        .sidebar h4{color:#6c757d;font-size:.9rem;margin-bottom:1rem;text-transform:uppercase;letter-spacing:1px}
        .doc-list{list-style:none;padding:0}
        .doc-item{padding:10px;margin-bottom:5px;cursor:pointer;border-radius:4px;transition:background .2s}
        .doc-item:hover{background:#e9ecef}
        .doc-item.active{background:var(--primary-color);color:#fff}
        .content-area{flex:1;padding:2rem;overflow-y:auto;background:#fff}
        #markdown-viewer{max-width:1200px;margin:0 auto}
        .markdown-body h1{font-size:1.6em}
        .markdown-body h2{font-size:1.35em}
        .markdown-body h3{font-size:1.15em}
        .markdown-body h4{font-size:1em}
        .markdown-body h5{font-size:.8em}
        .toc-panel{width:250px;background:#fff;border-left:1px solid var(--border-color);padding:1.5rem 1rem;overflow-y:auto;position:sticky;top:0;height:100vh}
        .toc-panel h4{color:var(--primary-color);font-size:.9rem;margin-bottom:1rem;padding-bottom:.5rem;border-bottom:2px solid var(--primary-color)}
        .toc-list{list-style:none;padding:0;margin:0}
        .toc-item{padding:6px 0;font-size:.85rem;color:#666;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color .2s}
        .toc-item:hover{color:var(--primary-color)}
        .toc-item.h1{font-weight:700;font-size:.95rem}
        .toc-item.h2{padding-left:12px}
        .toc-item.h3{padding-left:24px;color:#888}
    </style>
</head>
<body>

    <!-- 登录界面 -->
    <div id="login-overlay">
        <div class="login-card">
            <div id="protocol-warning" style="display: none; color: #856404; background-color: #fff3cd; border: 1px solid #ffeeba; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 14px; text-align: left;">
                <strong>⚠️ 检测到正在使用本地文件访问</strong><br>
                由于浏览器安全策略 (CORS)，直接打开 HTML 文件无法加载文档。请在终端运行：<br>
                <code>python3 -m http.server 8000</code><br>
                然后在浏览器访问：<br>
                <a href="http://localhost:8000" target="_blank">http://localhost:8000</a>
            </div>
            <h2>访问保护</h2>
            <p>请输入密码以查看文档</p>
            <input type="password" id="password-input" placeholder="请输入密码" onkeypress="handleKeyPress(event)">
            <button onclick="checkPassword()">登录</button>
            <p id="error-msg" style="color: red; display: none; margin-top: 10px;">密码错误，请重试</p>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="main-content">
        <div style="display: flex; flex: 1; overflow: hidden;">
            <div class="sidebar">
                <h3>Pay</h3>
                <div class="lang-select-container">
                    <select class="lang-select" id="lang-select" onchange="switchLang(this.value)">
                        <option value="cn">中文</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <h4 id="sidebar-title">国家列表</h4>
                <ul class="doc-list" id="doc-list">
                    <!-- 文档列表将动态生成 -->
                </ul>
            </div>
            <div class="content-area">
                <div id="markdown-viewer" class="markdown-body">
                    <h1 id="welcome-title">欢迎</h1>
                    <p id="welcome-msg">请从左侧选择一个文档进行查看。</p>
                </div>
            </div>
            <div class="toc-panel" id="toc-panel" style="display: none;">
                <h4 id="toc-title">目录</h4>
                <ul class="toc-list" id="toc-list-content">
                    <!-- 目录将动态生成 -->
                </ul>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 界面文本翻译配置 
        // ==========================================
        const i18n = {
            'cn': {
                sidebarTitle: '国家列表',
                tocTitle: '目录',
                backToTop: '回到顶部 ↑',
                welcomeTitle: '欢迎',
                welcomeMsg: '请从左侧选择一个文档进行查看。',
                loading: '正在加载...',
                fileNotFound: '文件未找到',
                loadFailed: '加载失败: ',
                countries: {
                    'brl': '巴西',
                    'mmk': '缅甸',
                    'rub': '俄罗斯',
                    'inr': '印度',
                    'mxn': '墨西哥',
                    'vnd': '越南',
                    'try': '土耳其',
                    "php": "菲律宾"
                }
            },
            'en': {
                sidebarTitle: 'Countries',
                tocTitle: 'Table of Contents',
                backToTop: 'Back to Top ↑',
                welcomeTitle: 'Welcome',
                welcomeMsg: 'Please select a document from the left to view.',
                loading: 'Loading...',
                fileNotFound: 'File not found',
                loadFailed: 'Load failed: ',
                countries: {
                    'brl': 'Brazil',
                    'mmk': 'Myanmar',
                    'rub': 'Russia',
                    'inr': 'India',
                    'mxn': 'Mexico',
                    'vnd': 'Vietnam',
                    'try': 'Turkey',
                    "php": "Philippines"
                }
            }
        };
    </script>
    <script>
        !function(){
            const _0='dmhm',_1='SFh1',_2='bUJZ',_3='dEVS',_4='V2lL',_5='UGpl';
            const _6=atob([_0,_1,_2,_3,_4,_5].join(''));
            const _a='\x76\x68\x66\x48\x58\x75\x6d\x42\x59\x74\x45\x52\x57\x69\x4b\x50\x6a\x65';
            const P=_6||_a;
            let L='cn';
            const D=[{n:'brl',f:'Doc_BRL.md'},{n:'mmk',f:'Doc_MMK.md'},{n:'rub',f:'Doc_RUB.md'},{n:'inr',f:'Doc_INR.md'},{n:'mxn',f:'Doc_MXN.md'},{n:'vnd',f:'Doc_VND.md'},{n:'try',f:'Doc_TRY.md'},{n:'php',f:'Doc_PHP.md'}];
            const P_MAP={'cn':'cn_docs/','en':'en_docs/'};
            window.switchLang=function(l){if(L===l)return;L=l;document.getElementById('lang-select').value=l;U();R();};
            function U(){const t=i18n[L];document.getElementById('sidebar-title').textContent=t.sidebarTitle;document.getElementById('toc-title').textContent=t.tocTitle;const v=document.getElementById('markdown-viewer');if(v.querySelector('h1')?.id==='welcome-title'){v.innerHTML='<h1 id="welcome-title">'+t.welcomeTitle+'</h1><p id="welcome-msg">'+t.welcomeMsg+'</p>';}}
            window.checkPassword=function(){const i=document.getElementById('password-input').value;if(i===P){sessionStorage.setItem('isLoggedIn','true');S();}else{document.getElementById('error-msg').style.display='block';}};
            window.handleKeyPress=function(e){if(e.key==='Enter')window.checkPassword();};
            function S(){document.getElementById('login-overlay').style.display='none';document.getElementById('main-content').style.display='flex';R();}
            function R(){const l=document.getElementById('doc-list');l.innerHTML='';const t=i18n[L];D.forEach((d,i)=>{const li=document.createElement('li');li.className='doc-item';li.textContent=t.countries[d.n]||d.n;const p=P_MAP[L]+d.f;li.onclick=()=>LD(p,li);l.appendChild(li);if(i===0)LD(p,li);});}
            async function LD(p,e){document.querySelectorAll('.doc-item').forEach(el=>el.classList.remove('active'));e.classList.add('active');const v=document.getElementById('markdown-viewer');const tp=document.getElementById('toc-panel');const tl=document.getElementById('toc-list-content');const t=i18n[L];v.innerHTML='<p>'+t.loading+'</p>';tp.style.display='none';try{const r=await fetch(p);if(!r.ok)throw new Error(t.fileNotFound);const tx=await r.text();marked.setOptions({highlight:function(c,l){const lg=hljs.getLanguage(l)?l:'plaintext';return hljs.highlight(c,{language:lg}).value;},langPrefix:'hljs language-'});v.innerHTML=marked.parse(tx);GT(v,tl);tp.style.display='block';v.querySelectorAll('pre code').forEach((b)=>{hljs.highlightElement(b);});}catch(err){v.innerHTML='<p style="color: red;">'+t.loadFailed+err.message+'</p>';}}
            function GT(v,tl){tl.innerHTML='';const t=i18n[L];const top=document.createElement('li');top.className='toc-item h1';top.textContent=t.backToTop;top.onclick=()=>{document.querySelector('.content-area').scrollTo({top:0,behavior:'smooth'});};tl.appendChild(top);v.querySelectorAll('h1, h2, h3').forEach((h,i)=>{h.id='heading-'+i;const li=document.createElement('li');li.className='toc-item '+h.tagName.toLowerCase();li.textContent=h.textContent;li.title=h.textContent;li.onclick=()=>{h.scrollIntoView({behavior:'smooth'});};tl.appendChild(li);});}
            window.onload=()=>{if(window.location.protocol==='file:'){document.getElementById('protocol-warning').style.display='block';}if(sessionStorage.getItem('isLoggedIn')==='true'){S();}};
        }();
    </script>
</body>
</html>
